name: Agentic LangGraph CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentic-ci-langgraph
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agentic-ci-langgraph/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run tests and generate HTML report
        run: pytest -v --html=reports/report.html --self-contained-html

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-langgraph-test-report
          path: agentic-ci-langgraph/reports/report.html
          if-no-files-found: warn
